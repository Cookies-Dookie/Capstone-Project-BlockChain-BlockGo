limit_req_zone $binary_remote_addr zone=plv_limit:10m rate=5r/s;

server {
    listen 80;
    server_name localhost;
    server_tokens off;

    limit_req zone=plv_limit burst=10 nodelay;

    location / {
        proxy_pass http://192.168.1.19:5000; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://192.168.1.19:4000; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }

    location /ipfs/ {
        proxy_pass http://ipfs0:8080/ipfs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}