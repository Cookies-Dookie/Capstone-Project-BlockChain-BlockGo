      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=node4:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=capstone
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=pass123
      - CORE_PEER_CHAINCODEADDRESS=registrar-chaincode:9999
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
    ports: ["10051:7051"]
    networks: [registrar-net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./crypto-config/peerOrganizations/registrar.capstone.com/peers/peer3.registrar.capstone.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/registrar.capstone.com/peers/peer3.registrar.capstone.com/tls:/etc/hyperledger/fabric/tls
      - ./crypto-config/peerOrganizations/registrar.capstone.com/tlsca/tlsca.registrar.capstone.com-cert.pem:/etc/hyperledger/fabric/tls/ca.crt
    depends_on:
