      - CORE_PEER_CHAINCODEADDRESS=registrar-chaincode:9999
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
    ports: ["8051:7051"]
    networks: [registrar-net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./crypto-config/peerOrganizations/registrar.capstone.com/peers/peer1.registrar.capstone.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/registrar.capstone.com/peers/peer1.registrar.capstone.com/tls:/etc/hyperledger/fabric/tls
      - ./crypto-config/peerOrganizations/registrar.capstone.com/tlsca/tlsca.registrar.capstone.com-cert.pem:/etc/hyperledger/fabric/tls/ca.crt
    depends_on:
      node2:  
        condition: service_healthy
      orderer.capstone.com:
        condition: service_started

  node2:
    image: couchdb:latest
    container_name: node2
