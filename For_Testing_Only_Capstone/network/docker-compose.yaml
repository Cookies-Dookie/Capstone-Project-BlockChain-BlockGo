    ports: ["5986:5984"]
    networks: [registrar-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- PEER 3 & NODE 4 ---
  peer3.registrar.capstone.com:
    image: hyperledger/fabric-peer:latest
    container_name: peer3.registrar.capstone.com
    environment:
      - CORE_VM_ENDPOINT=unix:///var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=registrar-net
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_ID=peer3.registrar.capstone.com
      - CORE_PEER_ADDRESS=peer3.registrar.capstone.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
