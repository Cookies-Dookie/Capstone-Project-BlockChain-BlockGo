  node4:
    image: couchdb:latest
    container_name: node4
    environment:
      - COUCHDB_USER=capstone
      - COUCHDB_PASSWORD=pass123
    ports: ["5987:5984"]
    networks: [registrar-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- PEER 4 & NODE 5 ---
  peer4.registrar.capstone.com:
    image: hyperledger/fabric-peer:latest
    container_name: peer4.registrar.capstone.com
    environment:
      - CORE_VM_ENDPOINT=unix:///var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=registrar-net
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_ID=peer4.registrar.capstone.com
      - CORE_PEER_ADDRESS=peer4.registrar.capstone.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=node5:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=capstone
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=pass123
      - CORE_PEER_CHAINCODEADDRESS=registrar-chaincode:9999
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
    ports: ["11051:7051"]
    networks: [registrar-net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./crypto-config/peerOrganizations/registrar.capstone.com/peers/peer4.registrar.capstone.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/registrar.capstone.com/peers/peer4.registrar.capstone.com/tls:/etc/hyperledger/fabric/tls
      - ./crypto-config/peerOrganizations/registrar.capstone.com/tlsca/tlsca.registrar.capstone.com-cert.pem:/etc/hyperledger/fabric/tls/ca.crt
    depends_on:
      node5:
        condition: service_healthy
      orderer.capstone.com:
        condition: service_started

  node5:
    image: couchdb:latest
    container_name: node5
    environment:
      - COUCHDB_USER=capstone
      - COUCHDB_PASSWORD=pass123
    ports: ["5988:5984"]
    networks: [registrar-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- PEER 5 & NODE 6 ---
  peer5.registrar.capstone.com:
    image: hyperledger/fabric-peer:latest
    container_name: peer5.registrar.capstone.com
    environment:
      - CORE_VM_ENDPOINT=unix:///var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=registrar-net
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_ID=peer5.registrar.capstone.com
      - CORE_PEER_ADDRESS=peer5.registrar.capstone.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=node6:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=capstone
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=pass123
      - CORE_PEER_CHAINCODEADDRESS=registrar-chaincode:9999
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
