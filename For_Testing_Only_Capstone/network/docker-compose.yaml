    networks: [registrar-net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./crypto-config/peerOrganizations/registrar.capstone.com/peers/peer5.registrar.capstone.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/registrar.capstone.com/peers/peer5.registrar.capstone.com/tls:/etc/hyperledger/fabric/tls
      - ./crypto-config/peerOrganizations/registrar.capstone.com/tlsca/tlsca.registrar.capstone.com-cert.pem:/etc/hyperledger/fabric/tls/ca.crt
    depends_on:
      node6:
        condition: service_healthy
      orderer.capstone.com:
        condition: service_started

  node6:
    image: couchdb:latest
    container_name: node6
    environment:
      - COUCHDB_USER=capstone
      - COUCHDB_PASSWORD=pass123
    ports: ["5989:5984"]
    networks: [registrar-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- UTILITY CONTAINERS ---
  fabric-tools:
    image: hyperledger/fabric-tools:latest
    container_name: fabric-tools
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
    volumes:
      - ./crypto-config:/etc/hyperledger/fabric/crypto-config
      - ./:/opt/fabric-config
      - ./chaincode:/opt/gopath/src/github.com/chaincode
    networks: [registrar-net]
    entrypoint: /bin/bash
    stdin_open: true
    tty: true
  registrar-chaincode:
    container_name: registrar-chaincode
    image: golang:1.23-alpine
    environment:
      - CHAINCODE_SERVER_ADDRESS=0.0.0.0:9999
      - CHAINCODE_ID=registrar_1.0:a96344bb53959e7e9187d0b1dcb3bbab439843708dcf3192cd91ceb70d1aebfb
      - CORE_CHAINCODE_ID_NAME=registrar_1.0:a96344bb53959e7e9187d0b1dcb3bbab439843708dcf3192cd91ceb70d1aebfb
      - CHAINCODE_TLS_DISABLED=true
      - CORE_PEER_TLS_ENABLED=false
    working_dir: /opt/gopath/src/github.com/chaincode/registrar
    volumes:
      - ./chaincode/registrar:/opt/gopath/src/github.com/chaincode/registrar
    ports: ["9999:9999"]
    networks: [registrar-net]
    command: sh -c "go mod download && go mod vendor && go build -mod=vendor -o registrar . && ./registrar"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9999"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  public-verifier-chaincode:
    container_name: public-verifier-chaincode
    image: golang:1.23-alpine
    environment:
      - CHAINCODE_SERVER_ADDRESS=0.0.0.0:9998
      - CHAINCODE_ID=public-verifier_1.0:e3bd4452c41eff6f27a02731c9e9e1c50111bb3d9cbd7f049e102394dd6f0d54
      - CORE_CHAINCODE_ID_NAME=public-verifier_1.0:e3bd4452c41eff6f27a02731c9e9e1c50111bb3d9cbd7f049e102394dd6f0d54
      - CHAINCODE_TLS_DISABLED=true
      - CORE_PEER_TLS_ENABLED=false
    working_dir: /opt/gopath/src/github.com/chaincode/public-verifier
    volumes:
      - ./chaincode/public-verifier:/opt/gopath/src/github.com/chaincode/public-verifier
    ports: ["9998:9998"]
    networks: [registrar-net]
    command: sh -c "go mod download && go mod vendor && go build -mod=vendor -o public-verifier . && ./public-verifier"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9998"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s


networks:
  registrar-net:
    name: registrar-net
    driver: bridge
