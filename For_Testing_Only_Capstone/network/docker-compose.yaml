version: '3.8'

services:
  orderer.capstone.com:
    image: hyperledger/fabric-orderer:latest
    container_name: orderer.capstone.com
    environment:
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_GENERAL_GENESISFILE=""
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:9443
      - ORDERER_ADMIN_TLS_ENABLED=false
    ports: ["7050:7050", "9443:9443"]
    networks: [registrar-net]
    volumes:
      - ./crypto-config/ordererOrganizations/capstone.com/orderers/orderer.capstone.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/capstone.com/orderers/orderer.capstone.com/tls:/var/hyperledger/orderer/tls

  # --- PEER 0 & NODE 1 ---
  peer0.registrar.capstone.com:
    image: hyperledger/fabric-peer:latest
    container_name: peer0.registrar.capstone.com
    environment:
      - CORE_VM_ENDPOINT=unix:///var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=registrar-net
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_ID=peer0.registrar.capstone.com
      - CORE_PEER_ADDRESS=peer0.registrar.capstone.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=node1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=capstone
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=pass123
      - CORE_PEER_CHAINCODEADDRESS=registrar-chaincode:9999
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
    ports: ["7051:7051"]
    networks: [registrar-net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./crypto-config/peerOrganizations/registrar.capstone.com/peers/peer0.registrar.capstone.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/registrar.capstone.com/peers/peer0.registrar.capstone.com/tls:/etc/hyperledger/fabric/tls
      - ./crypto-config/peerOrganizations/registrar.capstone.com/tlsca/tlsca.registrar.capstone.com-cert.pem:/etc/hyperledger/fabric/tls/ca.crt
    depends_on:
      node1:
        condition: service_healthy
      orderer.capstone.com:
        condition: service_started

  node1:
    image: couchdb:latest
    container_name: node1
    environment:
      - COUCHDB_USER=capstone
      - COUCHDB_PASSWORD=pass123
    ports: ["5984:5984"]
    networks: [registrar-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- PEER 1 & NODE 2 ---
  peer1.registrar.capstone.com:
    image: hyperledger/fabric-peer:latest
    container_name: peer1.registrar.capstone.com
    environment:
